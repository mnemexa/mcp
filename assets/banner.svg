<svg xmlns="http://www.w3.org/2000/svg" width="900" height="320" viewBox="0 0 900 320">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#050505"/>
      <stop offset="100%" style="stop-color:#0a0a0a"/>
    </linearGradient>
    <radialGradient id="glow1" cx="72%" cy="25%" r="45%">
      <stop offset="0%" style="stop-color:#38BDF8;stop-opacity:0.08"/>
      <stop offset="100%" style="stop-color:#38BDF8;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="20%" cy="80%" r="40%">
      <stop offset="0%" style="stop-color:#38BDF8;stop-opacity:0.04"/>
      <stop offset="100%" style="stop-color:#38BDF8;stop-opacity:0"/>
    </radialGradient>
    <linearGradient id="borderGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#38BDF8;stop-opacity:0"/>
      <stop offset="30%" style="stop-color:#38BDF8;stop-opacity:0.3"/>
      <stop offset="70%" style="stop-color:#38BDF8;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#38BDF8;stop-opacity:0"/>
    </linearGradient>
    <!-- Grid pattern -->
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="white" stroke-width="0.3" opacity="0.04"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="900" height="320" fill="url(#bg)" rx="16"/>

  <!-- Grid overlay -->
  <rect width="900" height="320" fill="url(#grid)" rx="16"/>

  <!-- Ambient glows -->
  <rect width="900" height="320" fill="url(#glow1)" rx="16"/>
  <rect width="900" height="320" fill="url(#glow2)" rx="16"/>

  <!-- Top border glow -->
  <line x1="0" y1="1" x2="900" y2="1" stroke="url(#borderGrad)" stroke-width="1.5"/>

  <!-- Floating dots -->
  <circle cx="680" cy="80" r="1.5" fill="#38BDF8" opacity="0.15"/>
  <circle cx="800" cy="200" r="1" fill="#38BDF8" opacity="0.1"/>
  <circle cx="120" cy="100" r="1" fill="#38BDF8" opacity="0.08"/>
  <circle cx="200" cy="260" r="1.5" fill="#38BDF8" opacity="0.06"/>

  <!-- Brand wordmark -->
  <text x="450" y="135" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="48" font-weight="600" letter-spacing="-1">
    <tspan fill="#38BDF8">Biz</tspan><tspan fill="#ffffff">X</tspan><tspan fill="#999999">Engine</tspan>
    <tspan fill="#ffffff" dx="14" font-weight="400" font-size="34" opacity="0.5">MCP</tspan>
  </text>

  <!-- Tagline -->
  <text x="450" y="175" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="16" fill="#ffffff" opacity="0.6" font-weight="300" letter-spacing="0.5">
    Give your AI a self-optimizing memory system
  </text>

  <!-- Pill badges -->
  <g transform="translate(310, 230)">
    <rect x="0" y="0" width="100" height="28" rx="14" fill="#38BDF8" opacity="0.1" stroke="#38BDF8" stroke-width="0.5" stroke-opacity="0.3"/>
    <text x="50" y="18" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#38BDF8" font-weight="500">Memory API</text>
  </g>
  <g transform="translate(425, 230)">
    <rect x="0" y="0" width="100" height="28" rx="14" fill="#38BDF8" opacity="0.1" stroke="#38BDF8" stroke-width="0.5" stroke-opacity="0.3"/>
    <text x="50" y="18" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#38BDF8" font-weight="500">Intelligence</text>
  </g>
  <g transform="translate(540, 230)">
    <rect x="0" y="0" width="100" height="28" rx="14" fill="#38BDF8" opacity="0.1" stroke="#38BDF8" stroke-width="0.5" stroke-opacity="0.3"/>
    <text x="50" y="18" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#38BDF8" font-weight="500">Multi-Agent</text>
  </g>

  <!-- Version badge bottom -->
  <text x="450" y="290" text-anchor="middle" font-family="monospace" font-size="11" fill="#ffffff" opacity="0.2">
    npm install @bizxengine/mcp
  </text>
</svg>
